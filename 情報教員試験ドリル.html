          "a：知識及び技能　b：思考力、判断力、表現力等　c：学びに向かう力、人間性等",
          "a：基礎的知識　b：応用力　c：態度・意欲",
          "a：知識・理解　b：技能・表現　c：関心・意欲・態度",
          "a：知識及び技能　b：問題解決能力　c：主体性・協働性"
        ],
        answer: 0,
        explanation: "【正解】ア：新学習指導要領で示された資質・能力の三つの柱です。「知識及び技能」「思考力、判断力、表現力等」「学びに向かう力、人間性等」の3つで構成されています。【イウエが誤りの理由】学習指導要領の正式な表現と異なります。"
      },
      {
        id: 132, category: "学習指導要領",
        question: "次の文の（　a　）〜（　c　）に当てはまる語句の組合せとして正しいものを選びなさい。\n\nカリキュラム・マネジメントの三つの側面は、（　a　）の配列、（　b　）の確保、（　c　）の改善である。",
        choices: [
          "a：教科等横断的な視点での教育内容　b：PDCAサイクル　c：教育課程の実施に必要な人的・物的体制",
          "a：教科ごとの内容　b：目標達成度　c：授業方法",
          "a：学年間の連携　b：評価基準　c：教材・教具",
          "a：教科等横断的な視点での教育内容　b：学力テスト　c：施設設備"
        ],
        answer: 0,
        explanation: "【正解】ア：カリキュラム・マネジメントの3側面です。①教科等横断的な視点での教育内容の組織的配列、②PDCAサイクルの確立、③人的・物的体制の確保と改善が求められています。【イウエが誤りの理由】カリキュラム・マネジメントの正式な3側面と異なります。"
      },
      {
        id: 133, category: "学習指導要領",
        question: "次の文の（　a　）〜（　c　）に当てはまる語句の組合せとして正しいものを選びなさい。\n\n高等学校情報科の科目構成において、共通必履修科目は（　a　）であり、選択科目として（　b　）と（　c　）がある。",
        choices: [
          "a：情報Ⅰ　b：情報Ⅱ　c：なし（情報Ⅱのみ）",
          "a：情報基礎　b：情報応用　c：情報実習",
          "a：情報Ⅰ　b：情報活用　c：情報の科学",
          "a：情報総合　b：情報Ⅰ　c：情報Ⅱ"
        ],
        answer: 0,
        explanation: "【正解】ア：2022年度施行の高等学校学習指導要領による情報科の科目構成です。「情報Ⅰ」が共通必履修科目、「情報Ⅱ」が選択科目として設定されています（選択科目は情報Ⅱのみ）。【イウエが誤りの理由】現行の情報科の科目構成と異なります。"
      },
      {
        id: 134, category: "学習指導要領",
        question: "次の文の（　a　）〜（　c　）に当てはまる語句の組合せとして正しいものを選びなさい。\n\n「情報Ⅰ」の4つの内容項目は、（　a　）、コミュニケーションと情報デザイン、（　b　）、（　c　）である。",
        choices: [
          "a：情報社会の問題解決　b：コンピュータとプログラミング　c：情報通信ネットワークとデータの活用",
          "a：情報モラル　b：アルゴリズム　c：ネットワーク",
          "a：情報と社会　b：プログラミング基礎　c：データベース",
          "a：情報社会の問題解決　b：情報システム　c：情報セキュリティ"
        ],
        answer: 0,
        explanation: "【正解】ア：「情報Ⅰ」の4つの内容項目です。(1)情報社会の問題解決、(2)コミュニケーションと情報デザイン、(3)コンピュータとプログラミング、(4)情報通信ネットワークとデータの活用で構成されています。【イウエが誤りの理由】学習指導要領の正式な項目名と異なります。"
      },
      {
        id: 135, category: "学習指導要領",
        question: "次の文の（　a　）〜（　c　）に当てはまる語句の組合せとして正しいものを選びなさい。\n\n学習評価の3観点は、（　a　）、（　b　）、（　c　）である。",
        choices: [
          "a：知識・技能　b：思考・判断・表現　c：主体的に学習に取り組む態度",
          "a：知識・理解　b：技能・表現　c：関心・意欲・態度",
          "a：基礎知識　b：応用力　c：学習意欲",
          "a：知識・技能　b：問題解決力　c：協働性"
        ],
        answer: 0,
        explanation: "【正解】ア：新学習指導要領に基づく学習評価の3観点です。旧来の4観点から「知識・技能」「思考・判断・表現」「主体的に学習に取り組む態度」の3観点に整理されました。【イウエが誤りの理由】現行の評価観点の正式名称と異なります。"
      }
    ];

    // カテゴリ一覧
    const categories = [...new Set(questions.map(q => q.category))];

    // 選択肢シャッフル用のシード生成（問題IDとセッションごとに異なる順序）
    const shuffleWithSeed = (array, seed) => {
      const result = [...array];
      let m = result.length, t, i;
      const random = () => {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      };
      while (m) {
        i = Math.floor(random() * m--);
        t = result[m];
        result[m] = result[i];
        result[i] = t;
      }
      return result;
    };

    function App() {
      // 状態管理
      const [mode, setMode] = useState('menu');
      const [currentCategory, setCurrentCategory] = useState('all');
      const [isRandomMode, setIsRandomMode] = useState(false);
      const [showOnlyWrong, setShowOnlyWrong] = useState(false);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const [history, setHistory] = useState({});
      const [sessionResults, setSessionResults] = useState([]);
      const [sessionSeed] = useState(() => Date.now()); // セッションごとのシード

      // フィルター済み問題リスト
      const filteredQuestions = useMemo(() => {
        let filtered = questions;
        if (currentCategory !== 'all') {
          filtered = filtered.filter(q => q.category === currentCategory);
        }
        if (showOnlyWrong) {
          filtered = filtered.filter(q => history[q.id]?.correct === false);
        }
        if (isRandomMode) {
          filtered = [...filtered].sort(() => Math.random() - 0.5);
        }
        return filtered;
      }, [currentCategory, showOnlyWrong, isRandomMode, history]);

      const currentQuestion = filteredQuestions[currentIndex];

      // 現在の問題の選択肢をシャッフル
      const shuffledData = useMemo(() => {
        if (!currentQuestion) return null;
        const indices = [0, 1, 2, 3];
        const shuffledIndices = shuffleWithSeed(indices, sessionSeed + currentQuestion.id);
        const shuffledChoices = shuffledIndices.map(i => currentQuestion.choices[i]);
        const correctShuffledIndex = shuffledIndices.indexOf(currentQuestion.answer);
        return { shuffledChoices, shuffledIndices, correctShuffledIndex };
      }, [currentQuestion, sessionSeed]);

      // 解説文を動的に生成（シャッフル後のラベルに対応）
      const getAdjustedExplanation = () => {
        if (!currentQuestion || !shuffledData) return '';
        const labels = ['ア', 'イ', 'ウ', 'エ'];
        const { shuffledIndices, correctShuffledIndex } = shuffledData;
        let explanation = currentQuestion.explanation;

        // 元のインデックス → シャッフル後のラベルのマッピング
        const originalToShuffled = {};
        shuffledIndices.forEach((origIdx, shuffledIdx) => {
          originalToShuffled[origIdx] = labels[shuffledIdx];
        });

        // 正解ラベルを置換
        const correctLabel = labels[correctShuffledIndex];
        explanation = explanation.replace(/【正解】[アイウエ]/, `【正解】${correctLabel}`);
        explanation = explanation.replace(/【正解（誤りの選択肢）】[アイウエ]/, `【正解（誤りの選択肢）】${correctLabel}`);
        explanation = explanation.replace(/【正解（含まれないもの）】[アイウエ]/, `【正解（含まれないもの）】${correctLabel}`);
        explanation = explanation.replace(/【正解（基本構造でないもの）】[アイウエ]/, `【正解（基本構造でないもの）】${correctLabel}`);

        // 各選択肢の誤り/正しい理由を置換
        ['ア', 'イ', 'ウ', 'エ'].forEach((label, origIdx) => {
          const newLabel = originalToShuffled[origIdx];
          explanation = explanation.replace(new RegExp(`【${label}が誤りの理由】`, 'g'), `【${newLabel}が誤りの理由】`);
          explanation = explanation.replace(new RegExp(`【${label}が正しい理由】`, 'g'), `【${newLabel}が正しい理由】`);
        });

        // 「アイウが正しい理由」「アイウエが正しい理由」などの複合パターンも対応
        explanation = explanation.replace(/【アイウが正しい理由】/g, `【${originalToShuffled[0]}${originalToShuffled[1]}${originalToShuffled[2]}が正しい理由】`);
        explanation = explanation.replace(/【アイウエが誤りの理由】/g, `【${originalToShuffled[0]}${originalToShuffled[1]}${originalToShuffled[2]}${originalToShuffled[3]}が誤りの理由】`);
        explanation = explanation.replace(/【イウエが誤りの理由】/g, `【${originalToShuffled[1]}${originalToShuffled[2]}${originalToShuffled[3]}が誤りの理由】`);

        return explanation;
      };

      const handleAnswer = () => {
        if (selectedAnswer === null || !shuffledData) return;
        const isCorrect = selectedAnswer === shuffledData.correctShuffledIndex;
        setHistory(prev => ({
          ...prev,
          [currentQuestion.id]: {
            correct: isCorrect,
            count: (prev[currentQuestion.id]?.count || 0) + 1
          }
        }));
        setSessionResults(prev => [...prev, {
          questionId: currentQuestion.id,
          correct: isCorrect
        }]);
        setShowResult(true);
      };

      const handleNext = () => {
        if (currentIndex < filteredQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
          setSelectedAnswer(null);
          setShowResult(false);
        } else {
          setMode('result');
        }
      };

      const startQuiz = (category, random, wrongOnly) => {
        setCurrentCategory(category);
        setIsRandomMode(random);
        setShowOnlyWrong(wrongOnly);
        setCurrentIndex(0);
        setSelectedAnswer(null);
        setShowResult(false);
        setSessionResults([]);
        setMode('quiz');
      };

      const backToMenu = () => setMode('menu');
      const resetHistory = () => setHistory({});

      const stats = useMemo(() => {
        const total = Object.keys(history).length;
        const correct = Object.values(history).filter(h => h.correct).length;
        return { total, correct, wrong: total - correct };
      }, [history]);

      // メニュー画面
      if (mode === 'menu') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-2xl mx-auto">
              <div className="text-center mb-8">
                <h1 className="text-2xl font-bold text-indigo-800 mb-2">高等学校（情報）教員資格認定試験</h1>
                <p className="text-lg text-indigo-600">対策ドリル 135問</p>
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 className="text-lg font-semibold text-gray-800 mb-4">📊 学習状況</h2>
                <div className="grid grid-cols-3 gap-4 text-center">
                  <div className="bg-blue-50 rounded-lg p-3">
                    <p className="text-2xl font-bold text-blue-600">{stats.total}</p>
                    <p className="text-sm text-gray-600">解答済み</p>
                  </div>
                  <div className="bg-green-50 rounded-lg p-3">
                    <p className="text-2xl font-bold text-green-600">{stats.correct}</p>
                    <p className="text-sm text-gray-600">正解</p>
                  </div>
                  <div className="bg-red-50 rounded-lg p-3">
                    <p className="text-2xl font-bold text-red-600">{stats.wrong}</p>
                    <p className="text-sm text-gray-600">不正解</p>
                  </div>
                </div>
                {stats.total > 0 && (
                  <button onClick={resetHistory} className="mt-4 text-sm text-gray-500 hover:text-red-500">
                    履歴をリセット
                  </button>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 className="text-lg font-semibold text-gray-800 mb-4">📝 出題モード</h2>
                <div className="space-y-3">
                  <button onClick={() => startQuiz('all', false, false)}
                    className="w-full py-3 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">
                    全135問に挑戦
                  </button>
                  <button onClick={() => startQuiz('all', true, false)}
                    className="w-full py-3 px-4 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                    🎲 ランダム出題
                  </button>
                  {stats.wrong > 0 && (
                    <button onClick={() => startQuiz('all', false, true)}
                      className="w-full py-3 px-4 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                      ❌ 不正解のみ復習（{stats.wrong}問）
                    </button>
                  )}
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-lg p-6">
                <h2 className="text-lg font-semibold text-gray-800 mb-4">📚 分野別出題</h2>
                <div className="space-y-2">
                  {categories.map(cat => {
                    const catQuestions = questions.filter(q => q.category === cat);
                    const catCorrect = catQuestions.filter(q => history[q.id]?.correct).length;
                    return (
                      <button key={cat} onClick={() => startQuiz(cat, false, false)}
                        className="w-full py-3 px-4 bg-gray-100 text-left rounded-lg hover:bg-gray-200 transition flex justify-between items-center">
                        <span className="font-medium text-gray-800">{cat}</span>
                        <span className="text-sm text-gray-500">{catCorrect}/{catQuestions.length}問正解</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 結果画面
      if (mode === 'result') {
        const correct = sessionResults.filter(r => r.correct).length;
        const total = sessionResults.length;
        const percentage = total > 0 ? Math.round((correct / total) * 100) : 0;

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-2xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                <h2 className="text-2xl font-bold text-gray-800 mb-6">🎉 終了！</h2>
                <div className="mb-8">
                  <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                  <p className="text-xl text-gray-600">{correct} / {total} 問正解</p>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-4 mb-8">
                  <div className="bg-indigo-600 h-4 rounded-full transition-all" style={{ width: `${percentage}%` }} />
                </div>
                <div className="space-y-3">
                  <button onClick={backToMenu}
                    className="w-full py-3 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">
                    メニューに戻る
                  </button>
                  {sessionResults.filter(r => !r.correct).length > 0 && (
                    <button onClick={() => startQuiz('all', false, true)}
                      className="w-full py-3 px-4 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                      不正解の問題を復習
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // クイズ画面
      if (!currentQuestion) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 flex items-center justify-center">
            <div className="bg-white rounded-xl shadow-lg p-8 text-center">
              <p className="text-gray-600 mb-4">該当する問題がありません</p>
              <button onClick={backToMenu} className="py-2 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                メニューに戻る
              </button>
            </div>
          </div>
        );
      }

      const labels = ['ア', 'イ', 'ウ', 'エ'];
      const isCorrectAnswer = shuffledData && selectedAnswer === shuffledData.correctShuffledIndex;

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
          <div className="max-w-2xl mx-auto">
            <div className="flex justify-between items-center mb-4">
              <button onClick={backToMenu} className="text-indigo-600 hover:text-indigo-800 font-medium">← メニュー</button>
              <span className="text-gray-600">{currentIndex + 1} / {filteredQuestions.length}</span>
            </div>

            <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
              <div className="bg-indigo-600 h-2 rounded-full transition-all" style={{ width: `${((currentIndex + 1) / filteredQuestions.length) * 100}%` }} />
            </div>

            <div className="bg-white rounded-xl shadow-lg p-6 mb-4">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <span className="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-medium">{currentQuestion.category}</span>
                  <span className="text-gray-500 text-sm">問{currentQuestion.id}</span>
                </div>
                {history[currentQuestion.id] && (
                  <div className={`flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium ${history[currentQuestion.id].correct ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                    <span>{history[currentQuestion.id].correct ? '✓' : '✗'}</span>
                    <span>前回{history[currentQuestion.id].correct ? '正解' : '不正解'}</span>
                    <span className="text-xs opacity-70">({history[currentQuestion.id].count}回挑戦)</span>
                  </div>
                )}
              </div>
              <p className="text-gray-800 text-lg leading-relaxed mb-6">{currentQuestion.question}</p>
              <div className="space-y-3">
                {shuffledData && shuffledData.shuffledChoices.map((choice, index) => {
                  const isSelected = selectedAnswer === index;
                  const isCorrect = index === shuffledData.correctShuffledIndex;
                  let bgColor = 'bg-gray-50 hover:bg-gray-100';
                  let borderColor = 'border-gray-200';
                  if (showResult) {
                    if (isCorrect) { bgColor = 'bg-green-50'; borderColor = 'border-green-500'; }
                    else if (isSelected && !isCorrect) { bgColor = 'bg-red-50'; borderColor = 'border-red-500'; }
                  } else if (isSelected) { bgColor = 'bg-indigo-50'; borderColor = 'border-indigo-500'; }
                  return (
                    <button key={index} onClick={() => !showResult && setSelectedAnswer(index)} disabled={showResult}
                      className={`w-full p-4 text-left rounded-lg border-2 transition ${bgColor} ${borderColor}`}>
                      <span className="font-medium text-gray-700 mr-2">{labels[index]}</span>
                      <span className="text-gray-800">{choice}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {showResult && (
              <div className={`rounded-xl shadow-lg p-6 mb-4 ${isCorrectAnswer ? 'bg-green-50' : 'bg-red-50'}`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">{isCorrectAnswer ? '⭕' : '❌'}</span>
                  <span className={`font-bold text-lg ${isCorrectAnswer ? 'text-green-700' : 'text-red-700'}`}>
                    {isCorrectAnswer ? '正解！' : '不正解'}
                  </span>
                </div>
                <p className="text-gray-700 leading-relaxed whitespace-pre-line">{getAdjustedExplanation()}</p>
              </div>
            )}

            <div className="flex gap-3">
              {!showResult ? (
                <button onClick={handleAnswer} disabled={selectedAnswer === null}
                  className={`flex-1 py-4 rounded-lg font-medium transition ${selectedAnswer === null ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                  解答する
                </button>
              ) : (
                <button onClick={handleNext}
                  className="flex-1 py-4 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition">
                  {currentIndex < filteredQuestions.length - 1 ? '次の問題へ' : '結果を見る'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
